{% extends "base.html" %}

{% block content %}
<div class="animate-fade-up max-w-6xl mx-auto" id="page-trip-dashboard">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 px-2">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white">Trip Management System</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1 font-medium">Organize itineraries, budget limits, checklists, and note summaries.</p>
        </div>
        <button onclick="toggleCreateModal(true)" class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-primary hover:bg-primary/90 text-white text-sm font-bold shadow-lg shadow-primary/20 hover:shadow-primary/30 transition-all transform hover:-translate-y-0.5">
            <i class="fa-solid fa-plus"></i>
            <span>Create Trip</span>
        </button>
    </div>

    <!-- Quick Stats Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 px-2">
        <div class="fw-card p-4 flex flex-col justify-between">
            <span class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">Total Trips</span>
            <div class="flex items-baseline gap-2 mt-2">
                <span id="stat-total" class="text-2xl font-black text-gray-900 dark:text-white">0</span>
                <span class="text-xs font-semibold text-gray-400">trips</span>
            </div>
        </div>
        <div class="fw-card p-4 flex flex-col justify-between">
            <span class="text-xs font-bold text-yellow-600 dark:text-yellow-400 uppercase tracking-widest">Planned</span>
            <div class="flex items-baseline gap-2 mt-2">
                <span id="stat-planned" class="text-2xl font-black text-gray-900 dark:text-white">0</span>
                <span class="text-xs font-semibold text-gray-400">upcoming</span>
            </div>
        </div>
        <div class="fw-card p-4 flex flex-col justify-between">
            <span class="text-xs font-bold text-success uppercase tracking-widest">Active</span>
            <div class="flex items-baseline gap-2 mt-2">
                <span id="stat-active" class="text-2xl font-black text-gray-900 dark:text-white">0</span>
                <span class="text-xs font-semibold text-gray-400">ongoing</span>
            </div>
        </div>
        <div class="fw-card p-4 flex flex-col justify-between">
            <span class="text-xs font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest">Completed</span>
            <div class="flex items-baseline gap-2 mt-2">
                <span id="stat-completed" class="text-2xl font-black text-gray-900 dark:text-white">0</span>
                <span class="text-xs font-semibold text-gray-400">finished</span>
            </div>
        </div>
    </div>

    <!-- Search and Filters -->
    <div class="fw-card mb-8 px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="relative w-full md:w-80">
            <input type="text" id="search-input" oninput="renderDashboard()" placeholder="Search by destination or name..." class="w-full pl-9 pr-4 py-2 text-xs font-medium rounded-xl border border-gray-200 dark:border-white/10 bg-gray-50/50 dark:bg-white/5 focus:outline-none focus:border-primary transition-all text-gray-900 dark:text-white">
            <i class="fa-solid fa-search absolute left-3.5 top-3 text-gray-400 text-xs"></i>
        </div>
        <div class="flex items-center gap-3 w-full md:w-auto overflow-x-auto pb-1 md:pb-0">
            <button onclick="setStatusFilter('All')" id="filter-all" class="px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all bg-primary/10 border border-primary/20 text-primary">All Status</button>
            <button onclick="setStatusFilter('Planned')" id="filter-planned" class="px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all border border-gray-200 dark:border-white/10 text-gray-500 hover:bg-gray-50 dark:hover:bg-white/5 dark:text-gray-400">Planned</button>
            <button onclick="setStatusFilter('Active')" id="filter-active" class="px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all border border-gray-200 dark:border-white/10 text-gray-500 hover:bg-gray-50 dark:hover:bg-white/5 dark:text-gray-400">Active</button>
            <button onclick="setStatusFilter('Completed')" id="filter-completed" class="px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all border border-gray-200 dark:border-white/10 text-gray-500 hover:bg-gray-50 dark:hover:bg-white/5 dark:text-gray-400">Completed</button>
        </div>
    </div>

    <!-- Trips Grid -->
    <div id="trips-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-2 mb-12">
        <!-- Dynamic loading states / empty states / trip cards go here -->
    </div>
</div>

<!-- CREATE TRIP MODAL -->
<div id="createModal" class="fixed inset-0 z-[500] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
    <div class="bg-white dark:bg-dark border border-gray-200 dark:border-white/10 rounded-2xl w-full max-w-md shadow-2xl p-6 relative animate-scale-up">
        <button onclick="toggleCreateModal(false)" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-white transition-all">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>

        <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-6 pb-2 border-b border-gray-150 dark:border-white/5 flex items-center gap-2">
            <i class="fa-solid fa-plane-departure text-primary"></i> Create Managed Trip
        </h3>

        <form id="createTripForm" onsubmit="handleCreateTrip(event)" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Trip Name</label>
                <input type="text" id="modal-name" required placeholder="e.g. Goa Monsoon road trip" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-white/5 focus:outline-none focus:border-primary text-xs font-semibold text-gray-900 dark:text-white">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Destination</label>
                <input type="text" id="modal-dest" required placeholder="e.g. Panaji, Goa" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-white/5 focus:outline-none focus:border-primary text-xs font-semibold text-gray-900 dark:text-white">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Start Date</label>
                    <input type="date" id="modal-start" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-white/5 focus:outline-none focus:border-primary text-xs font-semibold text-gray-900 dark:text-white">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">End Date</label>
                    <input type="date" id="modal-end" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-white/5 focus:outline-none focus:border-primary text-xs font-semibold text-gray-900 dark:text-white">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Category</label>
                    <select id="modal-category" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-white/5 focus:outline-none focus:border-primary text-xs font-semibold text-gray-900 dark:text-white">
                        <option value="Leisure">Leisure</option>
                        <option value="Business">Business</option>
                        <option value="Commute">Commute</option>
                        <option value="Campaign">Campaign</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Initial Status</label>
                    <select id="modal-status" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-white/5 focus:outline-none focus:border-primary text-xs font-semibold text-gray-900 dark:text-white">
                        <option value="Planned">Planned</option>
                        <option value="Active">Active</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
            </div>

            <div class="pt-4 flex gap-3">
                <button type="button" onclick="toggleCreateModal(false)" class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 text-xs font-bold text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5 transition-all text-center">Cancel</button>
                <button type="submit" class="flex-1 px-4 py-2.5 rounded-xl bg-primary hover:bg-primary/90 text-white text-xs font-bold transition-all text-center shadow-lg shadow-primary/10">Launch Trip</button>
            </div>
        </form>
    </div>
</div>

<script>
    let activeStatusFilter = 'All';

    // Premium default seed data
    const seedTrips = [
        {
            id: "trip-goa-expedition",
            name: "Monsoon Goa Expedition",
            destination: "South Goa, India",
            start_date: "2026-06-15",
            end_date: "2026-06-21",
            category: "Leisure",
            status: "Planned",
            rating: 0,
            budget: {
                "Fuel": 6000,
                "Food": 4000,
                "Lodging": 10000,
                "Others": 3000
            },
            expenses: [],
            checklist: [
                { id: "c1", item: "Verify tire pressures and spare check", checked: true },
                { id: "c2", item: "Carry DSLR Camera & drone chargers", checked: false },
                { id: "c3", item: "Download offline maps for Western Ghats", checked: true }
            ],
            timeline: [
                { id: "t1", time: "05:00 AM", activity: "Depart from city core", completed: false },
                { id: "t2", time: "12:00 PM", activity: "Western Ghats scenic lunch waypoint", completed: false },
                { id: "t3", time: "06:00 PM", activity: "Check-in Beach Villa, South Goa", completed: false }
            ],
            notes: "Western Ghats route will have intermittent cell service. Download offline GPS map buffers. Focus on scenic driving rather than speeds.",
            photos: [
                { id: "p1", url: "https://images.unsplash.com/photo-1544735716-392fe2489ffa?auto=format&fit=crop&w=400&q=80", caption: "Palm trees & beaches" }
            ],
            created_at: new Date().toISOString()
        },
        {
            id: "trip-chennai-summit",
            name: "Executive Chennai Summit",
            destination: "Chennai IT corridor",
            start_date: "2026-05-28",
            end_date: "2026-06-03",
            category: "Business",
            status: "Active",
            rating: 0,
            budget: {
                "Fuel": 4000,
                "Food": 6000,
                "Lodging": 12000,
                "Others": 2000
            },
            expenses: [
                { id: "e1", category: "Fuel", amount: 3500, description: "Initial highway fuel tank top up", date: "2026-05-28" },
                { id: "e2", category: "Lodging", amount: 11000, description: "Hotel corporate package", date: "2026-05-29" },
                { id: "e3", category: "Food", amount: 4800, description: "Business client executive dinner", date: "2026-05-30" }
            ],
            checklist: [
                { id: "c21", item: "Pack slide presenter pointer and clicker", checked: true },
                { id: "c22", item: "Carry corporate ID and tax receipts", checked: true },
                { id: "c23", item: "Print physical backup itinerary portfolios", checked: false }
            ],
            timeline: [
                { id: "t21", time: "07:00 AM", activity: "Highway departure to Chennai", completed: true },
                { id: "t22", time: "02:00 PM", activity: "IT Park client presentation", completed: true },
                { id: "t23", time: "10:00 AM", activity: "Wrap up feedback briefing", completed: false }
            ],
            notes: "Review IT Corridor toll fee maps. Reimbursements can be logged under corporate card.",
            photos: [
                { id: "p21", url: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=400&q=80", caption: "Executive towers" }
            ],
            created_at: new Date().toISOString()
        }
    ];

    // Load / Initialize trips
    function getTrips() {
        const raw = localStorage.getItem('fw-managed-trips');
        if (!raw) {
            localStorage.setItem('fw-managed-trips', JSON.stringify(seedTrips));
            return seedTrips;
        }
        return JSON.parse(raw);
    }

    function saveTrips(trips) {
        localStorage.setItem('fw-managed-trips', JSON.stringify(trips));
    }

    // Modal Control
    function toggleCreateModal(show) {
        const modal = document.getElementById('createModal');
        if (modal) {
            modal.classList.toggle('hidden', !show);
            if (show) {
                // Set default dates to today / next week
                const today = new Date().toISOString().split('T')[0];
                const nextWeek = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                document.getElementById('modal-start').value = today;
                document.getElementById('modal-end').value = nextWeek;
            }
        }
    }

    // Filter control
    function setStatusFilter(status) {
        activeStatusFilter = status;
        
        // Update tabs active state
        ['all', 'planned', 'active', 'completed'].forEach(s => {
            const btn = document.getElementById(`filter-${s}`);
            if (btn) {
                if (s === status.toLowerCase()) {
                    btn.className = "px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all bg-primary/10 border border-primary/20 text-primary";
                } else {
                    btn.className = "px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all border border-gray-200 dark:border-white/10 text-gray-500 hover:bg-gray-50 dark:hover:bg-white/5 dark:text-gray-400";
                }
            }
        });
        renderDashboard();
    }

    // Create Trip Handler
    function handleCreateTrip(event) {
        event.preventDefault();
        const trips = getTrips();
        
        const name = document.getElementById('modal-name').value.trim();
        const dest = document.getElementById('modal-dest').value.trim();
        const start = document.getElementById('modal-start').value;
        const end = document.getElementById('modal-end').value;
        const cat = document.getElementById('modal-category').value;
        const status = document.getElementById('modal-status').value;

        const newTrip = {
            id: 'trip-' + Math.random().toString(36).substr(2, 9),
            name: name,
            destination: dest,
            start_date: start,
            end_date: end,
            category: cat,
            status: status,
            rating: 0,
            budget: {
                "Fuel": 2000,
                "Food": 2000,
                "Lodging": 2000,
                "Others": 1000
            },
            expenses: [],
            checklist: [],
            timeline: [],
            notes: "",
            photos: [],
            created_at: new Date().toISOString()
        };

        trips.push(newTrip);
        saveTrips(trips);
        
        // Reset form
        document.getElementById('createTripForm').reset();
        toggleCreateModal(false);

        // Redirect to detail page directly
        window.location.href = `/trip/view/${newTrip.id}`;
    }

    // Delete Trip Handler
    function deleteTrip(e, tripId) {
        e.stopPropagation(); // prevent clicking card
        if (confirm("Are you sure you want to delete this trip and all its logged records?")) {
            let trips = getTrips();
            trips = trips.filter(x => x.id !== tripId);
            saveTrips(trips);
            renderDashboard();
        }
    }

    // Calculations for Progress Tracker
    function calculateCompletionStats(trip) {
        // Timeline Completion
        const tlTotal = trip.timeline.length;
        const tlDone = trip.timeline.filter(x => x.completed).length;
        const tlProgress = tlTotal > 0 ? Math.round((tlDone / tlTotal) * 100) : 0;

        // Checklist Completion
        const chkTotal = trip.checklist.length;
        const chkDone = trip.checklist.filter(x => x.checked).length;
        const chkProgress = chkTotal > 0 ? Math.round((chkDone / chkTotal) * 100) : 0;

        // Expense budget status
        const totalBudget = Object.values(trip.budget).reduce((a, b) => a + b, 0);
        const totalSpent = trip.expenses.reduce((a, b) => a + b.amount, 0);
        
        return {
            timeline: tlProgress,
            checklist: chkProgress,
            budget: {
                limit: totalBudget,
                spent: totalSpent,
                percent: totalBudget > 0 ? Math.round((totalSpent / totalBudget) * 100) : 0
            }
        };
    }

    // Render dashboard card grid & stats
    function renderDashboard() {
        const trips = getTrips();
        const grid = document.getElementById('trips-grid');
        const searchVal = document.getElementById('search-input').value.toLowerCase().trim();

        // 1. Calculate Stats Overview
        document.getElementById('stat-total').innerText = trips.length;
        document.getElementById('stat-planned').innerText = trips.filter(x => x.status === 'Planned').length;
        document.getElementById('stat-active').innerText = trips.filter(x => x.status === 'Active').length;
        document.getElementById('stat-completed').innerText = trips.filter(x => x.status === 'Completed').length;

        // 2. Filter list
        let filtered = trips;
        if (activeStatusFilter !== 'All') {
            filtered = filtered.filter(x => x.status === activeStatusFilter);
        }
        if (searchVal) {
            filtered = filtered.filter(x => 
                x.name.toLowerCase().includes(searchVal) || 
                x.destination.toLowerCase().includes(searchVal)
            );
        }

        // Sort by created date descending
        filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        if (!grid) return;
        grid.innerHTML = '';

        if (filtered.length === 0) {
            grid.className = "col-span-full py-12 flex flex-col items-center justify-center min-h-[300px] text-center";
            grid.innerHTML = `
                <div class="w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center mb-4 text-primary text-xl">
                    <i class="fa-solid fa-plane-slash"></i>
                </div>
                <h4 class="text-base font-bold text-gray-900 dark:text-white">No Trips Found</h4>
                <p class="text-xs text-gray-400 font-medium max-w-sm mt-1">Create a new itinerary plan or adjust your status filters to explore your voyages.</p>
            `;
            return;
        }
        
        grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-2 mb-12";

        filtered.forEach(trip => {
            const stats = calculateCompletionStats(trip);
            
            // Format category icon & tag colors
            const icons = {
                Leisure: 'fa-umbrella-beach',
                Business: 'fa-briefcase',
                Commute: 'fa-car-side',
                Campaign: 'fa-flag',
                Others: 'fa-globe'
            };
            const catIcon = icons[trip.category] || icons.Others;

            // Status light indicators
            const statusClassMap = {
                Planned: 'bg-amber-500/10 border-amber-500/25 text-amber-600 dark:text-amber-400',
                Active: 'bg-green-500/10 border-green-500/25 text-green-600 dark:text-green-500',
                Completed: 'bg-blue-500/10 border-blue-500/25 text-blue-600 dark:text-blue-400',
                Cancelled: 'bg-red-500/10 border-red-500/25 text-red-500 dark:text-red-400'
            };
            const statusClass = statusClassMap[trip.status] || 'bg-gray-500/10 text-gray-500';

            // Budget warn color
            const budgetWarnClass = stats.budget.spent > stats.budget.limit ? 'text-red-500' : 'text-primary';

            const card = document.createElement('div');
            card.className = "fw-card p-5 cursor-pointer hover:border-primary/20 hover:shadow-lg transition-all flex flex-col justify-between";
            card.onclick = () => { window.location.href = `/trip/view/${trip.id}`; };

            card.innerHTML = `
                <div>
                    <!-- Category Badge & Status Indicator -->
                    <div class="flex justify-between items-center mb-4">
                        <span class="flex items-center gap-1.5 px-2.5 py-1 bg-gray-100 dark:bg-white/5 border border-gray-150 dark:border-white/5 rounded-full text-[10px] font-bold text-gray-500 dark:text-gray-400">
                            <i class="fa-solid ${catIcon}"></i>
                            ${trip.category}
                        </span>
                        
                        <div class="flex items-center gap-2">
                            <span class="px-2 py-0.5 rounded-full border text-[9px] font-extrabold tracking-wider uppercase ${statusClass}">
                                ${trip.status}
                            </span>
                            
                            <button onclick="deleteTrip(event, '${trip.id}')" class="p-1 text-gray-400 hover:text-red-500 transition-all" title="Delete Trip">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Destination and Name -->
                    <h3 class="text-lg font-extrabold text-gray-900 dark:text-white truncate" title="${trip.name}">${trip.name}</h3>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-medium flex items-center gap-1 mt-1 truncate">
                        <i class="fa-solid fa-location-dot text-primary"></i>
                        ${trip.destination}
                    </p>

                    <!-- Dates -->
                    <div class="flex items-center gap-2 mt-3 text-[10px] text-gray-400 font-semibold uppercase tracking-wider">
                        <i class="fa-regular fa-calendar-days text-[11px]"></i>
                        <span>${trip.start_date}</span>
                        <span>→</span>
                        <span>${trip.end_date}</span>
                    </div>

                    <!-- Progress meters -->
                    <div class="space-y-3.5 mt-5 pt-5 border-t border-gray-100 dark:border-white/5">
                        <!-- Checklist Progress -->
                        <div>
                            <div class="flex justify-between text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">
                                <span>Packing Checklist</span>
                                <span>${stats.checklist}%</span>
                            </div>
                            <div class="w-full h-1.5 bg-gray-100 dark:bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full bg-primary rounded-full transition-all" style="width: ${stats.checklist}%"></div>
                            </div>
                        </div>

                        <!-- Timeline progress -->
                        <div>
                            <div class="flex justify-between text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">
                                <span>Timeline Progress</span>
                                <span>${stats.timeline}%</span>
                            </div>
                            <div class="w-full h-1.5 bg-gray-100 dark:bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full bg-secondary rounded-full transition-all" style="width: ${stats.timeline}%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Budget Summary -->
                <div class="mt-6 pt-4 border-t border-gray-150 dark:border-white/5 flex justify-between items-baseline">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Budget Status</span>
                    <span class="text-sm font-bold text-gray-700 dark:text-gray-300">
                        <span class="${budgetWarnClass}">₹${stats.budget.spent}</span>
                        <span class="text-xs text-gray-400"> / ₹${stats.budget.limit}</span>
                    </span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        renderDashboard();
    });
</script>
{% endblock content %}
